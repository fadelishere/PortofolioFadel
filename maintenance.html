<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmahUti - Under Maintenance</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Poppins', 'sans-serif'],
                        caveat: ['Caveat', 'cursive']
                    },
                    colors: {
                        darkBg: '#05050a',
                        primary: '#00f2fe',
                        secondary: '#4facfe'
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #05050a; }
        
        /* Efek Liquid Glass */
        .liquid-glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        inset 0 0 20px rgba(0, 242, 254, 0.05);
        }

        /* Tombol Liquid Glass (Versi Kecil) */
        .liquid-glass-button {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 242, 254, 0.4);
        }

        .liquid-glass-button:hover {
            background: rgba(0, 242, 254, 1);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.5),
                        inset 0 0 10px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px) scale(1.03);
            color: #05050a;
        }

        /* Animasi Pijar (Glowing) */
        .glow-text {
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.6);
        }

        /* Animasi Floating Gear */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(8deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Background Blurs */
        .blur-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.25;
        }
    </style>
</head>
<body class="text-gray-300 font-sans min-h-screen flex items-center justify-center overflow-hidden p-4 md:p-6">

    <div class="blur-circle w-64 h-64 md:w-96 md:h-96 bg-primary top-[-5%] left-[-10%]"></div>
    <div class="blur-circle w-56 h-56 md:w-80 md:h-80 bg-secondary bottom-[-5%] right-[-10%]"></div>

    <div class="max-w-md w-full text-center relative z-10">
        <div class="liquid-glass-card p-8 md:p-10 rounded-[2.5rem] relative overflow-hidden">
            
            <div class="mb-5 flex justify-center">
                <div class="relative">
                    <i class="fa-solid fa-screwdriver-wrench text-4xl md:text-5xl text-primary animate-float"></i>
                    <div class="absolute -top-1 -right-1 w-3 h-3 bg-secondary rounded-full animate-ping"></div>
                </div>
            </div>

            <h1 class="text-2xl md:text-3xl font-bold text-white mb-3 tracking-tight">
                <span class="text-primary glow-text">OmahUti</span> is <br> Under Maintenance
            </h1>
            
            <p class="text-gray-400 text-xs md:text-sm leading-relaxed font-light mb-5">
                We are currently updating our system to provide an even better shopping experience.
            </p>

            <p class="text-base md:text-lg font-semibold text-primary mb-8 tracking-wide glow-text">
                We’ll be back soon!
            </p>

            <div class="flex justify-center">
                <button onclick="closeMaintenance()" class="liquid-glass-button bg-primary/10 backdrop-blur-md px-8 py-2 text-white text-sm font-semibold rounded-full transition-all cursor-pointer">
                    Okey
                </button>
            </div>
        </div>
        
        <p class="mt-6 text-gray-600 text-[10px] md:text-xs tracking-widest uppercase">© 2026 Fadel Naya Raflinanto</p>
    </div>

    <script>
        function closeMaintenance() {
            // Mencoba menutup tab saat ini (berhasil jika halaman dibuka dari klik link tab baru)
            window.close();
            // Fallback: Jika browser memblokir penutupan tab, alihkan kembali ke halaman utama
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 100);
        }
    </script>
</body>
</html>
